notification:
  # Recipient defaults to JOBWATCH_EMAIL_USER if not set here.
  # Override with JOBWATCH_NOTIFY_EMAIL env var or uncomment below:
  # email: your_email@example.com
  smtp_host: smtp.gmail.com
  smtp_port: 587
  subject_prefix: "[JobWatch Inbox]"
  # Set these environment variables:
  #   JOBWATCH_EMAIL_USER=your_gmail@gmail.com
  #   JOBWATCH_EMAIL_PASSWORD=your_16_char_app_password
  #   JOBWATCH_NOTIFY_EMAIL=recipient@example.com  (optional, defaults to EMAIL_USER)

ranking:
  top_picks: 5
  preferred_companies: []
