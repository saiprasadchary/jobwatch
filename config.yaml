notification:
  # Recipient defaults to JOBWATCH_EMAIL_USER if not set here.
  # Override with JOBWATCH_NOTIFY_EMAIL env var or uncomment below:
  # email: your_email@example.com
  smtp_host: smtp.gmail.com
  smtp_port: 587
  subject_prefix: "[JobWatch Inbox]"
  # Set these environment variables:
  #   JOBWATCH_EMAIL_USER=your_gmail@gmail.com
  #   JOBWATCH_EMAIL_PASSWORD=your_16_char_app_password
  #   JOBWATCH_NOTIFY_EMAIL=recipient@example.com  (optional, defaults to EMAIL_USER)
  # Push notifications via ntfy.sh (optional — set JOBWATCH_NTFY_TOPIC env var or uncomment below)
  # ntfy_topic: your-secret-topic-name
  ntfy_server: https://ntfy.sh

  # Tier routing: companies are tagged tier: target | faang | other.
  # Each alerting tier sends its own tagged email and its own ntfy topic so
  # the streams stay distinct on your phone. 'other' is inbox-only (no
  # email, no push) — those roles still land in the workflow inbox.
  # ntfy topic resolves from the first env var in the list that is set.
  tiers:
    target:
      subject_tag: "🎯 TARGET"
      ntfy_priority: "5"
      ntfy_topic_env:
        - JOBWATCH_NTFY_TOPIC_TARGET
        - JOBWATCH_NTFY_TOPIC   # reuse the existing subscribed topic
      alert: true
    faang:
      subject_tag: "🚀 FAANG"
      ntfy_priority: "4"
      ntfy_topic_env:
        - JOBWATCH_NTFY_TOPIC_FAANG
      alert: true
    other:
      subject_tag: "📋 OTHER"
      ntfy_priority: "3"
      ntfy_topic_env:
        - JOBWATCH_NTFY_TOPIC_OTHER
      alert: true

ranking:
  top_picks: 5
  preferred_companies: []
