# Non-US locations are auto-filtered (India, UK, etc.)
# Additional location allowlist (empty = accept all US locations):
locations: []

runner:
  fast_workers: 8
  browser_workers: 1
  fast_timeout_seconds: 150
  browser_timeout_seconds: 210

alerting:
  # Top/Strong roles interrupt via Gmail. Watch roles still land in workflow inbox
  # and are marked seen so they do not keep repeating every run.
  email_bands:
    - Top
    - Strong

