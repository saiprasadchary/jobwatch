name: JobWatch - Career Page Monitor

on:
  schedule:
    - cron: '*/30 * * * *'    # Fast ATS/API lane every 30 minutes
    - cron: '17 */4 * * *'    # Browser lane every 4 hours, offset from fast lane
  workflow_dispatch:
    inputs:
      lane:
        description: JobWatch lane to run
        required: true
        default: all
        type: choice
        options:
          - all
          - fast
          - browser

permissions:
  contents: read
  actions: read

concurrency:
  group: jobwatch-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    # Backstop against hung SMTP/IMAP or browser sessions: without this a
    # stuck run holds the concurrency group for GitHub's 6h default and
    # queued scheduled runs suspend all alerting. Browser lane normally
    # takes ~25 min.
    timeout-minutes: 45
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Choose JobWatch lane
        id: lane
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            lane="${{ inputs.lane }}"
          elif [ "${{ github.event.schedule }}" = "17 */4 * * *" ]; then
            lane="browser"
          else
            lane="fast"
          fi
          echo "lane=$lane" >> "$GITHUB_OUTPUT"
          echo "Running JobWatch lane: $lane"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ "${{ steps.lane.outputs.lane }}" != "fast" ]; then
            playwright install --with-deps chromium
          fi

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Compute H-1B fiscal quarter
        id: h1b-key
        run: |
          # DOL publishes LCA data quarterly but with a lag.
          # Try the current quarter first; fall back to the previous one if 404.
          month=$(date +%m)
          year=$(date +%Y)
          if [ "$month" -ge 10 ]; then fy=$((year + 1)); else fy=$year; fi
          case $month in
            10|11|12) q=1; pq=4; pfy=$((fy - 1)) ;;
            01|02|03) q=2; pq=1; pfy=$fy ;;
            04|05|06) q=3; pq=2; pfy=$fy ;;
            07|08|09) q=4; pq=3; pfy=$fy ;;
          esac
          url="https://www.dol.gov/media/LCA_Dislclosure_Data_FY${fy}_Q${q}.xlsx"
          if curl -sI "$url" | head -1 | grep -q "200"; then
            echo "key=h1b-sponsors-fy${fy}-q${q}" >> "$GITHUB_OUTPUT"
            echo "url=$url" >> "$GITHUB_OUTPUT"
            echo "Using H-1B data: FY${fy} Q${q}"
          else
            fallback="https://www.dol.gov/media/LCA_Dislclosure_Data_FY${pfy}_Q${pq}.xlsx"
            echo "key=h1b-sponsors-fy${pfy}-q${pq}" >> "$GITHUB_OUTPUT"
            echo "url=$fallback" >> "$GITHUB_OUTPUT"
            echo "FY${fy} Q${q} not published yet; falling back to FY${pfy} Q${pq}"
          fi

      - name: Download H-1B sponsor data (cached)
        uses: actions/cache@v5
        id: h1b-cache
        with:
          path: h1b_sponsors.db
          key: ${{ steps.h1b-key.outputs.key }}

      - name: Build H-1B sponsor DB if not cached
        if: steps.h1b-key.outputs.found == '1' && steps.h1b-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          curl -L -o /tmp/lca.xlsx "${{ steps.h1b-key.outputs.url }}"
          # DOL occasionally serves a small HTML error stub with HTTP 200; a
          # real LCA workbook is >100 MB. Skip (don't fail the run) if the
          # download isn't a plausible xlsx.
          size=$(wc -c < /tmp/lca.xlsx)
          if [ "$size" -lt 1000000 ]; then
            echo "H-1B download was only ${size} bytes (not a valid xlsx); skipping sponsor DB build."
            exit 0
          fi
          python3 << 'PYEOF'
          import openpyxl, sqlite3
          import re

          def normalize(name: str) -> str:
              name = name.upper().strip().replace("&", " AND ")
              name = re.sub(r"\b(INC\.?|LLC\.?|CORP\.?|CO\.?|LTD\.?|L\.?P\.?|GROUP|SERVICES?|TECHNOLOGIES?|COMPANY|SYSTEMS?)\b", "", name)
              name = re.sub(r"[.,'\"()/-]", " ", name)
              return re.sub(r"\s+", " ", name).strip()

          wb = openpyxl.load_workbook('/tmp/lca.xlsx', read_only=True)
          ws = wb.active
          sponsors = {}
          for row in ws.iter_rows(min_row=2, values_only=True):
              visa = str(row[5] or '')
              status = str(row[1] or '')
              employer = str(row[19] or '').strip()
              if 'H-1B' in visa and status in ('Certified', 'Certified - Withdrawn') and employer:
                  name = employer.upper().strip()
                  sponsors[name] = sponsors.get(name, 0) + 1
          wb.close()
          conn = sqlite3.connect('h1b_sponsors.db')
          conn.execute("DROP TABLE IF EXISTS sponsors")
          conn.execute(
              "CREATE TABLE sponsors (employer_name TEXT PRIMARY KEY, normalized_name TEXT, lca_count INTEGER)"
          )
          conn.executemany(
              "INSERT INTO sponsors (employer_name, normalized_name, lca_count) VALUES (?, ?, ?)",
              [(employer_name, normalize(employer_name), count) for employer_name, count in sponsors.items()],
          )
          conn.execute("CREATE INDEX idx_sponsors_normalized_name ON sponsors(normalized_name)")
          conn.commit()
          conn.close()
          print(f"Built H-1B DB: {len(sponsors)} sponsors")
          PYEOF

      - name: Restore JobWatch state artifact
        id: state-artifact
        env:
          GH_TOKEN: ${{ github.token }}
          STATE_KEY: ${{ secrets.JOBWATCH_STATE_KEY }}
        run: |
          set -euo pipefail
          restored=0
          for run_id in $(gh run list --workflow "$GITHUB_WORKFLOW" --status success --limit 20 --json databaseId --jq '.[].databaseId'); do
            rm -rf /tmp/jobwatch-state
            mkdir -p /tmp/jobwatch-state
            if gh run download "$run_id" -n jobwatch-state -D /tmp/jobwatch-state >/dev/null 2>&1; then
              if [ -f /tmp/jobwatch-state/jobwatch.db.enc ] && [ -n "$STATE_KEY" ]; then
                if openssl enc -d -aes-256-cbc -pbkdf2 -in /tmp/jobwatch-state/jobwatch.db.enc -out jobwatch.db -pass env:STATE_KEY; then
                  echo "Restored encrypted JobWatch DB from workflow run $run_id"
                  restored=1
                  break
                fi
                echo "Failed to decrypt state from run $run_id; trying older runs."
              elif [ -f /tmp/jobwatch-state/jobwatch.db ]; then
                # Legacy plaintext artifact from before encryption was added.
                cp /tmp/jobwatch-state/jobwatch.db jobwatch.db
                echo "Restored legacy plaintext JobWatch DB from workflow run $run_id"
                restored=1
                break
              fi
            fi
          done
          if [ "$restored" -eq 0 ]; then
            echo "No previous JobWatch state artifact found; starting with a fresh local DB."
          fi
          echo "restored=$restored" >> "$GITHUB_OUTPUT"

      - name: Run JobWatch
        env:
          JOBWATCH_EMAIL_USER: ${{ secrets.JOBWATCH_EMAIL_USER }}
          JOBWATCH_EMAIL_PASSWORD: ${{ secrets.JOBWATCH_EMAIL_PASSWORD }}
          JOBWATCH_NTFY_TOPIC: ${{ secrets.JOBWATCH_NTFY_TOPIC }}
          JOBWATCH_NTFY_TOPIC_TARGET: ${{ secrets.JOBWATCH_NTFY_TOPIC_TARGET }}
          JOBWATCH_NTFY_TOPIC_FAANG: ${{ secrets.JOBWATCH_NTFY_TOPIC_FAANG }}
          JOBWATCH_NTFY_TOPIC_OTHER: ${{ secrets.JOBWATCH_NTFY_TOPIC_OTHER }}
        run: python jobwatch.py run --lane "${{ steps.lane.outputs.lane }}"

      - name: Encrypt JobWatch state
        if: always()
        env:
          STATE_KEY: ${{ secrets.JOBWATCH_STATE_KEY }}
        run: |
          # Artifacts on a public repo are downloadable by anyone with a
          # GitHub account — never upload the DB in plaintext.
          if [ -f jobwatch.db ] && [ -n "$STATE_KEY" ]; then
            openssl enc -aes-256-cbc -pbkdf2 -salt -in jobwatch.db -out jobwatch.db.enc -pass env:STATE_KEY
          fi

      - name: Upload JobWatch state artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jobwatch-state
          path: jobwatch.db.enc
          if-no-files-found: warn
          retention-days: 90
